name: Architecture Scan (Non-Blocking)

on:
  # NO path filter — intentional (CI-RED-004). The "Fence Checks (Blocking)" job
  # below is a REQUIRED status check on main. A required check must report a
  # result on EVERY pull request, or GitHub leaves it permanently "Expected —
  # waiting" and the PR can never merge. A path filter would skip the workflow on
  # docs-only PRs (SPRINTS/ledger/handoff updates are frequent here), silently
  # bricking those merges. The fence job is self-contained — it re-verifies the
  # committed baselines in ratchet mode regardless of which files a PR touches —
  # so on a docs-only PR it runs and passes cheaply. Running on every push to
  # main also records the blocking verdict on every merge commit (the original
  # reason a red fence once reached main under a pull_request-only trigger).
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  architecture-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run architecture scan
        run: |
          python scripts/architecture/scan_architecture.py \
            --targets services/api/app packages/client/src \
            --out reports/architecture_scan.json

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture_scan
          path: reports/architecture_scan.json

  fence-checks:
    name: Fence Checks (Blocking)
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify baseline files exist
        run: |
          test -f services/api/app/ci/fence_baseline.json
          test -f services/api/app/ci/fence_patterns_baseline.json

      - name: Run fence checks (ratchet mode)
        working-directory: services/api
        run: |
          python -m app.ci.check_all_fences
