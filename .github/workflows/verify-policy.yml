name: verify-policy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        if: ${{ secrets.SG_SPEC_TOKEN != '' }}
        run: |
          git config --global url."https://${{ secrets.SG_SPEC_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install API dependencies
        run: |
          cd services/api
          pip install --quiet -r requirements.txt
          pip install --quiet pytest pytest-cov

      - name: Run spine tests
        run: |
          cd services/api
          python -m pytest tests/test_golden_m1_replay.py -v --no-header

      - name: Verify policy against repo fixtures
        run: |
          python tools/verify_policy.py services/api/tests/fixtures/
