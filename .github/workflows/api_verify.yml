name: API Verify (Contracts + Fences)

on:
  push:
    paths:
      - "services/api/**"
      - "packages/client/**"
      - "scripts/**"
      - "Makefile"
  pull_request:
    paths:
      - "services/api/**"
      - "packages/client/**"
      - "scripts/**"
      - "Makefile"
  workflow_dispatch:

jobs:
  api-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        if: ${{ secrets.SG_SPEC_TOKEN != '' }}
        run: |
          git config --global url."https://${{ secrets.SG_SPEC_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Require SG_SPEC_TOKEN for sg-spec install
        if: ${{ secrets.SG_SPEC_TOKEN == '' }}
        run: |
          echo "::error::SG_SPEC_TOKEN not configured — cannot clone private sg-spec; api-verify cannot run"
          exit 1

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Run api-verify
        run: make api-verify
