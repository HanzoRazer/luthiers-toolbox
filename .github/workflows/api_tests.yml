name: API Tests
on: [push, pull_request]
env:
  SG_SPEC_TOKEN: ${{ secrets.SG_SPEC_TOKEN }}

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    env:
      API_BASE: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git for private repos
        if: ${{ env.SG_SPEC_TOKEN != '' }}
        run: |
          git config --global url."https://${{ secrets.SG_SPEC_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install API
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt
      - name: Boot API
        run: |
          cd services/api
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level info > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          cd ../..
          python scripts/ci/wait_for_api_ready.py \
            --base-url "$API_BASE" \
            --paths /health,/api/health \
            --timeout-seconds 60 \
            --pid-file /tmp/uvicorn.pid \
            --log-file /tmp/uvicorn.log
      - name: Upload uvicorn log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log-api-tests
          path: /tmp/uvicorn.log
          if-no-files-found: ignore
      - name: Simulate sample
        run: |
          python - <<'PY'
          import urllib.request, json
          gcode = "G21 G90 G17 F1200\nG0 Z5\nG0 X0 Y0\nG1 Z-1 F300\nG2 X60 Y40 I0 J20\nG0 Z5\n"
          import os
          req = urllib.request.Request(f"{os.environ['API_BASE']}/api/cam/sim/simulate_gcode", data=json.dumps({"gcode":gcode}).encode(), headers={"Content-Type":"application/json"})
          resp = urllib.request.urlopen(req)
          print(resp.read().decode())
          modal = resp.headers.get("X-CAM-Modal")
          print(f"Modal: {modal}")
          PY
      - name: Tooling endpoints
        run: |
          curl -sSf $API_BASE/api/tooling/posts | jq '.'

      - name: API verify (includes Phase 32.0 contract tests)
        run: |
          cd services/api && python -m pytest -q app/tests/