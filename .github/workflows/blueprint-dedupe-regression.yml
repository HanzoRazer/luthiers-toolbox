name: Blueprint Dedupe Fixture Regression

# =============================================================================
# PR-only / validation-only.
#
# Drives the REFINED blueprint cleanup/export path on real fixtures (Gibson
# Explorer / El Cuatro / Melody Maker) with BLUEPRINT_ENABLE_GEOMETRY_DEDUPE
# off and on, and checks structural invariants: DXF R12 (AC1009), LINE present,
# no LWPOLYLINE, geometry preserved, dedupe stats present only when enabled.
#
# Runs on Python 3.11 to avoid the local Python 3.14 / numpy import issue.
# This workflow does NOT enable the flag in production and does NOT merge.
# =============================================================================

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/api/app/cam/**'
      - 'services/api/app/services/blueprint_clean.py'
      - 'services/api/app/services/blueprint_limits.py'
      - 'services/api/app/services/blueprint_orchestrator.py'
      - 'services/api/tests/**'
      - 'services/api/scripts/run_blueprint_dedupe_fixture_regression.py'
      - '.github/workflows/blueprint-dedupe-regression.yml'
  workflow_dispatch:

env:
  SG_SPEC_TOKEN: ${{ secrets.SG_SPEC_TOKEN }}

jobs:
  dedupe-fixture-regression:
    name: Geometry Dedupe Fixture Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure git for private repos
        if: ${{ env.SG_SPEC_TOKEN != '' }}
        run: |
          git config --global url."https://${{ secrets.SG_SPEC_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        working-directory: ./services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dedupe fixture regression
        run: |
          python services/api/scripts/run_blueprint_dedupe_fixture_regression.py
