name: CBSP21 Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cbsp21-gate:
    name: CBSP21 Patch Manifest Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            MERGE_BASE=$(git merge-base "$BASE" "$HEAD")
            CHANGED=$(git diff --name-only "$MERGE_BASE" "$HEAD" | tr '\n' ' ')
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" | tr '\n' ' ')
          fi
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Run CBSP21 Gate Check
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          # No --manifest: the gate auto-discovers .cbsp21/patches/*.json (+ the
          # legacy .cbsp21/patch_input.json) and selects the best-covering one.
          python scripts/ci/check_cbsp21_gate.py \
            --changed-files $CHANGED_FILES

      - name: CBSP21 Gate Summary
        if: always()
        run: |
          echo "## CBSP21 Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Use the same discovery the gate uses, rather than shell globbing.
          MANIFESTS=$(python -c "import sys; sys.path.insert(0, 'scripts/ci'); from cbsp21_manifest_discovery import discover_manifest_paths; print('\n'.join(str(p) for p in discover_manifest_paths()))")
          if [ -n "$MANIFESTS" ]; then
            echo "### Candidate manifests discovered:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$MANIFESTS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No manifest found under \`.cbsp21/patches/\` or \`.cbsp21/patch_input.json\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Create one under \`.cbsp21/patches/<patch-id>.json\` using \`.cbsp21/patch_input.json.example\` as a template." >> $GITHUB_STEP_SUMMARY
          fi
