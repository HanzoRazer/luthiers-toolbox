name: Spine Tests

on:
  push:
    branches: [main]
    paths:
      - 'services/api/app/agentic/**'
      - 'services/api/tests/test_*_engine_v1.py'
      - 'services/api/tests/test_replay_smoke.py'
      - 'services/api/tests/test_event_contract_parity.py'
  pull_request:
    paths:
      - 'services/api/app/agentic/**'
      - 'services/api/tests/test_*_engine_v1.py'
      - 'services/api/tests/test_replay_smoke.py'
      - 'services/api/tests/test_event_contract_parity.py'

jobs:
  spine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run spine tests
        run: |
          # Only run tests for files that exist (agentic spine is WIP)
          TEST_FILES=""
          for f in test_event_contract_parity.py test_moments_engine_v1.py test_policy_engine_v1.py test_replay_smoke.py; do
            if [ -f "tests/$f" ]; then
              TEST_FILES="$TEST_FILES tests/$f"
            else
              echo "Skipping missing test: tests/$f"
            fi
          done
          if [ -n "$TEST_FILES" ]; then
            pytest -q $TEST_FILES --tb=short
          else
            echo "No spine test files found - skipping"
          fi

      - name: Verify determinism (run twice)
        run: |
          if [ -f "tests/test_replay_smoke.py" ]; then
            pytest -q tests/test_replay_smoke.py --tb=short
            pytest -q tests/test_replay_smoke.py --tb=short
          else
            echo "Skipping determinism check - test_replay_smoke.py not found"
          fi
