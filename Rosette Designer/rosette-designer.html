<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rosette Designer — The Production Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #141210;
  --surface:  #1e1a16;
  --surface2: #272018;
  --border:   #3a3020;
  --gold:     #c8922a;
  --gold-lt:  #e0b050;
  --cream:    #e8dcc8;
  --text:     #c0aa88;
  --dim:      #6a5e48;
  --red:      #c44830;
  --teal:     #2a8888;
  --highlight:#c8922a33;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
header h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gold-lt);
  letter-spacing: 0.06em;
}
.header-tag {
  font-size: 0.55rem;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 2px;
}
.header-spacer { flex: 1; }
.header-info { font-size: 0.58rem; color: var(--dim); }
.header-info span { color: var(--gold); }

/* ── Main Layout ─────────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left Sidebar: Tile Palette ──────────────────────── */
.palette {
  width: 188px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}
.panel-title {
  font-size: 0.55rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.palette-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.palette-scroll::-webkit-scrollbar { width: 3px; }
.palette-scroll::-webkit-scrollbar-track { background: transparent; }
.palette-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cat-label {
  font-size: 0.52rem;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.tile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
.tile-item {
  cursor: grab;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
  background: var(--surface2);
}
.tile-item:hover {
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(200,146,42,0.25);
}
.tile-item.selected-tile {
  border-color: var(--gold-lt);
  box-shadow: 0 0 12px rgba(224,176,80,0.4);
}
.tile-item svg { display: block; width: 100%; height: 44px; }
.tile-name {
  font-size: 0.5rem;
  color: var(--dim);
  text-align: center;
  padding: 3px 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tile-item:hover .tile-name { color: var(--text); }

/* ── Canvas Area ─────────────────────────────────────── */
.canvas-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  overflow: hidden;
}
.canvas-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(200,146,42,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,146,42,0.035) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
#wheel-svg {
  position: relative; z-index: 1;
  cursor: crosshair;
  filter: drop-shadow(0 0 48px rgba(200,146,42,0.12));
}

/* ── Right Panel: Controls ───────────────────────────── */
.controls {
  width: 188px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}
.ctrl-section {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.ctrl-label {
  font-size: 0.52rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 7px;
}

/* Segment count */
.seg-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.seg-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 22px; height: 22px;
  font-size: 0.9rem;
  cursor: pointer;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.1s;
  flex-shrink: 0;
}
.seg-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
#seg-display {
  color: var(--gold-lt);
  font-size: 0.75rem;
  min-width: 28px;
  text-align: center;
}
.seg-label { font-size: 0.55rem; color: var(--dim); }

/* Symmetry buttons */
.sym-group { display: flex; flex-direction: column; gap: 4px; }
.sym-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  font-family: inherit;
  font-size: 0.58rem;
  cursor: pointer;
  border-radius: 2px;
  text-align: left;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sym-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
.sym-btn.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
  font-weight: 500;
}
.sym-icon { font-size: 0.85rem; }

/* Ring toggles */
.ring-toggles { display: flex; flex-direction: column; gap: 4px; }
.ring-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 0.57rem;
  color: var(--dim);
  padding: 3px 0;
  transition: color 0.1s;
}
.ring-toggle:hover { color: var(--text); }
.ring-toggle.active { color: var(--text); }
.ring-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.5;
  transition: opacity 0.1s;
}
.ring-toggle.active .ring-dot { opacity: 1; }

/* Action buttons */
.action-group { display: flex; flex-direction: column; gap: 5px; }
.act-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  font-family: inherit;
  font-size: 0.58rem;
  cursor: pointer;
  border-radius: 2px;
  text-align: center;
  transition: all 0.12s;
  width: 100%;
}
.act-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
.act-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* Cell info */
.cell-info {
  flex: 1;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.57rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px;
}
.info-key { color: var(--dim); }
.info-val { color: var(--gold-lt); }
.info-empty { font-size: 0.55rem; color: var(--dim); font-style: italic; margin-top: 4px; }

/* ── Status bar ──────────────────────────────────────── */
.statusbar {
  display: flex;
  gap: 20px;
  padding: 5px 14px;
  border-top: 1px solid var(--border);
  font-size: 0.55rem;
  color: var(--dim);
  background: var(--surface);
  flex-shrink: 0;
}
.statusbar span { color: var(--gold); }

/* ── Drag Ghost ──────────────────────────────────────── */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.8;
  display: none;
  transform: translate(-50%, -50%);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#drag-ghost svg { display: block; }

/* Drop highlight */
.cell-hover {
  opacity: 0.6;
  fill: var(--gold-lt) !important;
}
</style>
</head>
<body>

<header>
  <h1>Rosette Designer</h1>
  <div class="header-tag">Production Shop</div>
  <div class="header-spacer"></div>
  <div class="header-info">Segments: <span id="hdr-segs">12</span> &nbsp;|&nbsp; Filled: <span id="hdr-filled">0</span> &nbsp;|&nbsp; Symmetry: <span id="hdr-sym">Rotational</span></div>
</header>

<div class="main">

  <!-- ── Tile Palette ── -->
  <div class="palette">
    <div class="panel-title">✦ Tile Palette</div>
    <div class="palette-scroll" id="palette-scroll">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- ── Wheel Canvas ── -->
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="wheel-svg" width="600" height="600" viewBox="0 0 600 600">
      <defs id="svg-defs"></defs>
      <g id="wheel-bg"></g>
      <g id="wheel-cells"></g>
      <g id="wheel-guides"></g>
      <g id="wheel-labels"></g>
    </svg>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">
    <div class="ctrl-section">
      <div class="ctrl-label">Segments</div>
      <div class="seg-row">
        <button class="seg-btn" id="seg-dec">−</button>
        <div id="seg-display">12</div>
        <button class="seg-btn" id="seg-inc">+</button>
        <div class="seg-label">divisions</div>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Symmetry</div>
      <div class="sym-group">
        <button class="sym-btn active" data-sym="rotational"><span class="sym-icon">◎</span>Rotational (full ring)</button>
        <button class="sym-btn" data-sym="bilateral"><span class="sym-icon">⇔</span>Bilateral (mirror)</button>
        <button class="sym-btn" data-sym="quadrant"><span class="sym-icon">✛</span>Quadrant (×4)</button>
        <button class="sym-btn" data-sym="none"><span class="sym-icon">◦</span>None (single cell)</button>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Ring Zones</div>
      <div class="ring-toggles" id="ring-toggles">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Actions</div>
      <div class="action-group">
        <button class="act-btn" id="btn-export">Export SVG</button>
        <button class="act-btn" id="btn-fill-sym">Fill Active Ring</button>
        <button class="act-btn danger" id="btn-clear">Clear All</button>
      </div>
    </div>

    <div class="cell-info" id="cell-info">
      <div class="ctrl-label">Selected Cell</div>
      <div class="info-empty">Hover over wheel cells</div>
    </div>
  </div>

</div>

<div class="statusbar">
  <div>Drop tiles onto wheel segments</div>
  <div>Active tile: <span id="st-tile">—</span></div>
  <div>Ring: <span id="st-ring">—</span></div>
  <div>Seg: <span id="st-seg">—</span></div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost"><svg width="60" height="60"><rect width="60" height="60" id="ghost-fill" rx="4"/></svg></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════
const CX = 300, CY = 300;

const RING_DEFS = [
  { label: 'Soundhole Ring', r1: 52,  r2: 76,  color: '#4a3818' },
  { label: 'Inner Purfling', r1: 76,  r2: 110, color: '#3a4818' },
  { label: 'Main Channel',   r1: 110, r2: 170, color: '#183a48' },
  { label: 'Outer Purfling', r1: 170, r2: 200, color: '#483018' },
  { label: 'Outer Binding',  r1: 200, r2: 228, color: '#482818' },
];

const RING_DOT_COLORS = ['#c8922a', '#7aaa50', '#50aac8', '#c87a50', '#c85050'];

const SEG_STEPS = [6, 8, 10, 12, 16, 20, 24];

// ═══════════════════════════════════════════════════════
//  TILE DEFINITIONS
// ═══════════════════════════════════════════════════════
const TILE_CATS = [
  {
    label: 'Tonewoods',
    tiles: [
      { id: 'maple',    name: 'Maple',       type: 'solid',   color: '#D4B483' },
      { id: 'rosewood', name: 'Rosewood',    type: 'solid',   color: '#6B2D1A' },
      { id: 'ebony',    name: 'Ebony',       type: 'solid',   color: '#1C1C1C' },
      { id: 'mahogany', name: 'Mahogany',    type: 'solid',   color: '#8B4513' },
      { id: 'spruce',   name: 'Spruce',      type: 'solid',   color: '#EDD9A3' },
      { id: 'walnut',   name: 'Walnut',      type: 'solid',   color: '#5C3D2E' },
    ]
  },
  {
    label: 'Decorative',
    tiles: [
      { id: 'abalone',      name: 'Abalone',      type: 'abalone'  },
      { id: 'mother_pearl', name: "Moth. Pearl",   type: 'mop'      },
      { id: 'burl',         name: 'Burl',          type: 'burl'     },
      { id: 'binding_cream',name: 'Cream Binding', type: 'solid',   color: '#F5E6C8' },
    ]
  },
  {
    label: 'Purfling',
    tiles: [
      { id: 'bwb',   name: 'B/W/B',     type: 'stripes', colors: ['#111','#eee','#111'],   orient: 'h' },
      { id: 'rbr',   name: 'R/B/R',     type: 'stripes', colors: ['#c03','#111','#c03'],    orient: 'h' },
      { id: 'wbw',   name: 'W/B/W',     type: 'stripes', colors: ['#eee','#111','#eee'],    orient: 'h' },
    ]
  },
  {
    label: 'Motifs',
    tiles: [
      { id: 'herringbone', name: 'Herringbone', type: 'herringbone' },
      { id: 'checkerboard',name: 'Checker',     type: 'checker'     },
      { id: 'celtic',      name: 'Celtic Knot', type: 'celtic'      },
      { id: 'diagonal',    name: 'Diagonal',    type: 'diagonal'    },
      { id: 'dots',        name: 'Dot Inlay',   type: 'dots'        },
      { id: 'clear',       name: 'Clear',       type: 'clear'       },
    ]
  },
];

// Flatten for lookup
const TILE_MAP = {};
TILE_CATS.forEach(cat => cat.tiles.forEach(t => { TILE_MAP[t.id] = t; }));

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let numSegs = 12;
let symMode = 'rotational';
let grid = {};            // key:`${r}-${s}` → tileId
let ringActive = RING_DEFS.map(() => true);
let selectedTile = null;
let hoveredCell = null;
let isDragging = false;
let dragTileId = null;

// ═══════════════════════════════════════════════════════
//  SVG PATTERN BUILDERS
// ═══════════════════════════════════════════════════════
function buildPatternDefs() {
  const defs = document.getElementById('svg-defs');
  defs.innerHTML = `
    <!-- Abalone -->
    <linearGradient id="g-abalone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6ae0d0"/>
      <stop offset="25%"  stop-color="#50c8e8"/>
      <stop offset="50%"  stop-color="#8860d0"/>
      <stop offset="75%"  stop-color="#50e890"/>
      <stop offset="100%" stop-color="#60b8e8"/>
    </linearGradient>
    <pattern id="pat-abalone" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="url(#g-abalone)" opacity="0.85"/>
      <ellipse cx="10" cy="10" rx="8" ry="5" fill="rgba(255,255,255,0.18)" transform="rotate(-30,10,10)"/>
      <ellipse cx="22" cy="22" rx="6" ry="4" fill="rgba(255,255,255,0.12)" transform="rotate(20,22,22)"/>
    </pattern>

    <!-- Mother of Pearl -->
    <linearGradient id="g-mop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0f0ee"/>
      <stop offset="40%"  stop-color="#e8ddf8"/>
      <stop offset="70%"  stop-color="#f0ece0"/>
      <stop offset="100%" stop-color="#d8f0ee"/>
    </linearGradient>
    <pattern id="pat-mop" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="url(#g-mop)"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(200,190,220,0.3)" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(200,190,220,0.2)" stroke-width="0.5"/>
    </pattern>

    <!-- Burl / figured maple -->
    <pattern id="pat-burl" x="0" y="0" width="24" height="16" patternUnits="userSpaceOnUse">
      <rect width="24" height="16" fill="#C8A048"/>
      <ellipse cx="6"  cy="8" rx="5" ry="3" fill="none" stroke="#a07828" stroke-width="1" opacity="0.6"/>
      <ellipse cx="6"  cy="8" rx="2" ry="1.2" fill="#a07828" opacity="0.4"/>
      <ellipse cx="16" cy="5" rx="4" ry="2.5" fill="none" stroke="#b09030" stroke-width="0.8" opacity="0.5"/>
      <ellipse cx="20" cy="12" rx="3" ry="2" fill="none" stroke="#907020" stroke-width="0.8" opacity="0.5"/>
    </pattern>

    <!-- Herringbone -->
    <pattern id="pat-herringbone" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#C09850"/>
      <!-- Left V block - NE stripes -->
      <line x1="-2" y1="12" x2="8" y2="-2" stroke="#7a5c28" stroke-width="2.8"/>
      <line x1="2"  y1="16" x2="14" y2="-2" stroke="#7a5c28" stroke-width="2.8"/>
      <line x1="7"  y1="20" x2="20" y2="4"  stroke="#7a5c28" stroke-width="2.8"/>
      <!-- Right V block - NW stripes -->
      <line x1="10" y1="-2" x2="22" y2="14" stroke="#5a3c10" stroke-width="2.8"/>
      <line x1="5"  y1="-2" x2="20" y2="16" stroke="#5a3c10" stroke-width="2.8"/>
      <line x1="-2" y1="4"  x2="12" y2="20" stroke="#5a3c10" stroke-width="2.8"/>
      <line x1="10" y1="10" x2="10" y2="20" stroke="#9a7830" stroke-width="1" opacity="0.6"/>
      <line x1="10" y1="0"  x2="10" y2="10" stroke="#9a7830" stroke-width="1" opacity="0.6"/>
    </pattern>

    <!-- Checkerboard -->
    <pattern id="pat-checker" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0e8d8"/>
      <rect x="0" y="0" width="7" height="7" fill="#1a1a1a"/>
      <rect x="7" y="7" width="7" height="7" fill="#1a1a1a"/>
    </pattern>

    <!-- Celtic knot (simplified interlace) -->
    <pattern id="pat-celtic" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#1a3a2a"/>
      <path d="M4,4 Q12,12 20,4 Q12,0 4,4Z" fill="none" stroke="#50c880" stroke-width="2" opacity="0.8"/>
      <path d="M4,20 Q12,12 20,20 Q12,24 4,20Z" fill="none" stroke="#50c880" stroke-width="2" opacity="0.8"/>
      <path d="M4,4 Q0,12 4,20 Q8,12 4,4Z" fill="none" stroke="#30a860" stroke-width="1.5" opacity="0.7"/>
      <path d="M20,4 Q24,12 20,20 Q16,12 20,4Z" fill="none" stroke="#30a860" stroke-width="1.5" opacity="0.7"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="#50c880" stroke-width="1.5"/>
    </pattern>

    <!-- Diagonal stripes -->
    <pattern id="pat-diagonal" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#c8922a"/>
      <line x1="-2" y1="10" x2="10" y2="-2"  stroke="#8B5a10" stroke-width="3.5"/>
      <line x1="4"  y1="14" x2="14" y2="4"    stroke="#8B5a10" stroke-width="3.5"/>
    </pattern>

    <!-- Dots -->
    <pattern id="pat-dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#f5e6c8"/>
      <circle cx="6" cy="6" r="2.5" fill="#1a1a1a"/>
    </pattern>

    <!-- Purfling stripe patterns -->
    <pattern id="pat-bwb" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="3" fill="#111"/>
      <rect x="0" y="3" width="9" height="3" fill="#eee"/>
      <rect x="0" y="6" width="9" height="3" fill="#111"/>
    </pattern>
    <pattern id="pat-rbr" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="3" fill="#cc0033"/>
      <rect x="0" y="3" width="9" height="3" fill="#111"/>
      <rect x="0" y="6" width="9" height="3" fill="#cc0033"/>
    </pattern>
    <pattern id="pat-wbw" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="3" fill="#eee"/>
      <rect x="0" y="3" width="9" height="3" fill="#111"/>
      <rect x="0" y="6" width="9" height="3" fill="#eee"/>
    </pattern>

    <!-- Soundhole cutout -->
    <radialGradient id="g-soundhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080604"/>
      <stop offset="100%" stop-color="#0e0a06"/>
    </radialGradient>
  `;
}

function getTileFill(tileId) {
  if (!tileId || tileId === 'clear') return 'none';
  const t = TILE_MAP[tileId];
  if (!t) return '#888';
  if (t.type === 'solid')    return t.color;
  if (t.type === 'abalone')  return 'url(#pat-abalone)';
  if (t.type === 'mop')      return 'url(#pat-mop)';
  if (t.type === 'burl')     return 'url(#pat-burl)';
  if (t.type === 'herringbone') return 'url(#pat-herringbone)';
  if (t.type === 'checker')  return 'url(#pat-checker)';
  if (t.type === 'celtic')   return 'url(#pat-celtic)';
  if (t.type === 'diagonal') return 'url(#pat-diagonal)';
  if (t.type === 'dots')     return 'url(#pat-dots)';
  if (t.type === 'stripes')  return `url(#pat-${tileId})`;
  return '#888';
}

function getTilePreviewSVG(tile, w=80, h=44) {
  const fill = getTileFill(tile.id);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      ${document.getElementById('svg-defs').innerHTML}
    </defs>
    ${tile.id === 'clear'
      ? `<rect width="${w}" height="${h}" fill="none" stroke="#3a3020" stroke-dasharray="4,3"/><line x1="0" y1="0" x2="${w}" y2="${h}" stroke="#3a3020" stroke-width="0.8"/>`
      : `<rect width="${w}" height="${h}" fill="${fill}"/>`
    }
  </svg>`;
}

// ═══════════════════════════════════════════════════════
//  GEOMETRY
// ═══════════════════════════════════════════════════════
function rad(deg) { return deg * Math.PI / 180; }

function arcPath(r1, r2, aDeg1, aDeg2) {
  const a1 = rad(aDeg1 - 90), a2 = rad(aDeg2 - 90);
  const large = (aDeg2 - aDeg1) > 180 ? 1 : 0;
  const xi1 = CX + r1 * Math.cos(a1), yi1 = CY + r1 * Math.sin(a1);
  const xo1 = CX + r2 * Math.cos(a1), yo1 = CY + r2 * Math.sin(a1);
  const xo2 = CX + r2 * Math.cos(a2), yo2 = CY + r2 * Math.sin(a2);
  const xi2 = CX + r1 * Math.cos(a2), yi2 = CY + r1 * Math.sin(a2);
  return `M ${xi1} ${yi1} L ${xo1} ${yo1} A ${r2} ${r2} 0 ${large} 1 ${xo2} ${yo2} L ${xi2} ${yi2} A ${r1} ${r1} 0 ${large} 0 ${xi1} ${yi1} Z`;
}

function hitTest(svgX, svgY) {
  const dx = svgX - CX, dy = svgY - CY;
  const r = Math.sqrt(dx*dx + dy*dy);
  let ang = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;
  if (ang < 0) ang += 360;
  if (ang >= 360) ang -= 360;
  for (let ri = 0; ri < RING_DEFS.length; ri++) {
    const { r1, r2 } = RING_DEFS[ri];
    if (r >= r1 && r < r2 && ringActive[ri]) {
      const segAngle = 360 / numSegs;
      const si = Math.floor(ang / segAngle);
      return { ring: ri, seg: si };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════
//  WHEEL RENDERING
// ═══════════════════════════════════════════════════════
function buildWheel() {
  const bg = document.getElementById('wheel-bg');
  const cells = document.getElementById('wheel-cells');
  const guides = document.getElementById('wheel-guides');
  const labels = document.getElementById('wheel-labels');
  bg.innerHTML = '';
  cells.innerHTML = '';
  guides.innerHTML = '';
  labels.innerHTML = '';

  // Background disc
  const maxR = RING_DEFS[RING_DEFS.length - 1].r2;
  const minR = RING_DEFS[0].r1;

  // Outer shadow ring
  const outerDisc = svgElem('circle', { cx: CX, cy: CY, r: maxR + 4,
    fill: 'none', stroke: 'rgba(200,146,42,0.15)', 'stroke-width': 8 });
  bg.appendChild(outerDisc);

  // Soundhole
  const sh = svgElem('circle', { cx: CX, cy: CY, r: minR - 2,
    fill: 'url(#g-soundhole)', stroke: 'rgba(200,146,42,0.4)', 'stroke-width': 1.5 });
  bg.appendChild(sh);

  // Ring background zones (empty state color)
  RING_DEFS.forEach(({ r1, r2, color }, ri) => {
    const ring = svgElem('path', {
      d: arcPath(r1, r2, 0, 360),
      fill: ringActive[ri] ? color : 'rgba(20,18,16,0.5)',
      stroke: 'rgba(200,146,42,0.08)',
      'stroke-width': 0.5,
      opacity: ringActive[ri] ? 1 : 0.4,
    });
    ring.style.transition = 'opacity 0.2s';
    bg.appendChild(ring);
  });

  // Cell paths
  const segAngle = 360 / numSegs;
  for (let ri = 0; ri < RING_DEFS.length; ri++) {
    const { r1, r2 } = RING_DEFS[ri];
    for (let si = 0; si < numSegs; si++) {
      const a1 = si * segAngle;
      const a2 = (si + 1) * segAngle;
      const key = `${ri}-${si}`;
      const tileId = grid[key];
      const d = arcPath(r1, r2, a1, a2);

      // Filled cell
      const cellFill = svgElem('path', {
        d,
        id: `cell-fill-${key}`,
        fill: tileId ? getTileFill(tileId) : 'none',
        'data-ring': ri, 'data-seg': si,
      });
      cells.appendChild(cellFill);

      // Invisible hit area
      const hitArea = svgElem('path', {
        d,
        id: `cell-hit-${key}`,
        fill: 'transparent',
        stroke: 'none',
        cursor: ringActive[ri] ? 'pointer' : 'default',
        'data-ring': ri, 'data-seg': si,
      });
      hitArea.addEventListener('mouseenter', onCellEnter);
      hitArea.addEventListener('mouseleave', onCellLeave);
      hitArea.addEventListener('mouseup', onCellDrop);
      hitArea.addEventListener('click', onCellClick);
      cells.appendChild(hitArea);
    }
  }

  // Guide lines
  // Radial spokes
  for (let si = 0; si < numSegs; si++) {
    const angle = rad(si * segAngle - 90);
    const xA = CX + minR * Math.cos(angle);
    const yA = CY + minR * Math.sin(angle);
    const xB = CX + maxR * Math.cos(angle);
    const yB = CY + maxR * Math.sin(angle);
    guides.appendChild(svgElem('line', {
      x1: xA, y1: yA, x2: xB, y2: yB,
      stroke: 'rgba(200,146,42,0.25)', 'stroke-width': 0.6,
    }));
  }

  // Ring boundary circles
  RING_DEFS.forEach(({ r1, r2 }) => {
    [r1, r2].forEach(r => {
      guides.appendChild(svgElem('circle', {
        cx: CX, cy: CY, r,
        fill: 'none', stroke: 'rgba(200,146,42,0.35)', 'stroke-width': 0.7,
      }));
    });
  });

  // Center cross-hair
  [[-12,0,12,0],[0,-12,0,12]].forEach(([x1,y1,x2,y2]) => {
    guides.appendChild(svgElem('line', {
      x1: CX+x1, y1: CY+y1, x2: CX+x2, y2: CY+y2,
      stroke: 'rgba(200,146,42,0.5)', 'stroke-width': 0.8,
    }));
  });

  // Dimension annotation
  const outerR = RING_DEFS[RING_DEFS.length-1].r2;
  const annY = CY - outerR - 14;
  labels.appendChild(svgElem('line', { x1: CX-outerR, y1: annY, x2: CX+outerR, y2: annY, stroke: 'rgba(200,146,42,0.4)', 'stroke-width': 0.7 }));
  labels.appendChild(svgElem('line', { x1: CX-outerR, y1: annY-4, x2: CX-outerR, y2: annY+4, stroke: 'rgba(200,146,42,0.4)', 'stroke-width': 0.7 }));
  labels.appendChild(svgElem('line', { x1: CX+outerR, y1: annY-4, x2: CX+outerR, y2: annY+4, stroke: 'rgba(200,146,42,0.4)', 'stroke-width': 0.7 }));
  const lbl = svgElem('text', { x: CX, y: annY-4, 'text-anchor': 'middle', fill: 'rgba(200,146,42,0.6)', 'font-size': '9', 'font-family': 'JetBrains Mono, monospace' });
  lbl.textContent = `Ø ${(outerR * 2 / 100).toFixed(2)}"`;
  labels.appendChild(lbl);
}

function svgElem(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function refreshCell(ri, si) {
  const key = `${ri}-${si}`;
  const el = document.getElementById(`cell-fill-${key}`);
  if (el) el.setAttribute('fill', grid[key] ? getTileFill(grid[key]) : 'none');
}

// ═══════════════════════════════════════════════════════
//  SYMMETRY
// ═══════════════════════════════════════════════════════
function getSymCells(ri, si) {
  const cells = [];
  if (symMode === 'none') {
    cells.push([ri, si]);
  } else if (symMode === 'rotational') {
    for (let s = 0; s < numSegs; s++) cells.push([ri, s]);
  } else if (symMode === 'bilateral') {
    cells.push([ri, si]);
    const mirror = (numSegs - si) % numSegs;
    if (mirror !== si) cells.push([ri, mirror]);
  } else if (symMode === 'quadrant') {
    const step = Math.floor(numSegs / 4);
    for (let i = 0; i < 4; i++) {
      const s = (si + i * step) % numSegs;
      cells.push([ri, s]);
      const mirror = (numSegs - s) % numSegs;
      if (mirror !== s) cells.push([ri, mirror]);
    }
  }
  // deduplicate
  const seen = new Set();
  return cells.filter(([r,s]) => {
    const k = `${r}-${s}`;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
}

function placeTile(ri, si, tileId) {
  const targets = getSymCells(ri, si);
  targets.forEach(([r, s]) => {
    const key = `${r}-${s}`;
    if (tileId === 'clear') {
      delete grid[key];
    } else {
      grid[key] = tileId;
    }
    refreshCell(r, s);
  });
  updateStatus();
}

// ═══════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════
function onCellEnter(e) {
  const ri = +e.target.dataset.ring;
  const si = +e.target.dataset.seg;
  hoveredCell = { ri, si };
  if (!ringActive[ri]) return;

  // Highlight affected cells
  getSymCells(ri, si).forEach(([r, s]) => {
    const el = document.getElementById(`cell-fill-${r}-${s}`);
    if (el && !grid[`${r}-${s}`]) {
      el.setAttribute('fill', 'rgba(200,146,42,0.18)');
      el.setAttribute('stroke', 'rgba(200,146,42,0.5)');
      el.setAttribute('stroke-width', '0.8');
    }
  });

  // Update cell info panel
  updateCellInfo(ri, si);
  document.getElementById('st-ring').textContent = RING_DEFS[ri].label;
  document.getElementById('st-seg').textContent = si + 1;
}

function onCellLeave(e) {
  const ri = +e.target.dataset.ring;
  const si = +e.target.dataset.seg;
  hoveredCell = null;

  // Remove highlight
  for (let r = 0; r < RING_DEFS.length; r++) {
    for (let s = 0; s < numSegs; s++) {
      const key = `${r}-${s}`;
      const el = document.getElementById(`cell-fill-${key}`);
      if (el) {
        el.setAttribute('fill', grid[key] ? getTileFill(grid[key]) : 'none');
        el.setAttribute('stroke', 'none');
        el.setAttribute('stroke-width', '0');
      }
    }
  }
  document.getElementById('st-ring').textContent = '—';
  document.getElementById('st-seg').textContent = '—';
}

function onCellDrop(e) {
  if (!isDragging && !selectedTile) return;
  const ri = +e.target.dataset.ring;
  const si = +e.target.dataset.seg;
  if (!ringActive[ri]) return;
  const tid = isDragging ? dragTileId : selectedTile;
  placeTile(ri, si, tid);
  e.preventDefault();
}

function onCellClick(e) {
  if (selectedTile) {
    const ri = +e.target.dataset.ring;
    const si = +e.target.dataset.seg;
    if (!ringActive[ri]) return;
    placeTile(ri, si, selectedTile);
  }
}

function updateCellInfo(ri, si) {
  const info = document.getElementById('cell-info');
  const key = `${ri}-${si}`;
  const tileId = grid[key];
  const { r1, r2, label } = RING_DEFS[ri];
  const segAngle = 360 / numSegs;
  const arcLen = Math.round((r1 + r2) / 2 * segAngle * Math.PI / 180 * 10) / 10;

  info.innerHTML = `
    <div class="ctrl-label">Selected Cell</div>
    <div class="info-row"><span class="info-key">Zone</span><span class="info-val">${label}</span></div>
    <div class="info-row"><span class="info-key">Segment</span><span class="info-val">${si + 1} / ${numSegs}</span></div>
    <div class="info-row"><span class="info-key">Angle</span><span class="info-val">${segAngle.toFixed(1)}°</span></div>
    <div class="info-row"><span class="info-key">Arc depth</span><span class="info-val">${((r2 - r1) / 100).toFixed(3)}"</span></div>
    <div class="info-row"><span class="info-key">Arc length</span><span class="info-val">~${(arcLen / 100).toFixed(3)}"</span></div>
    <div class="info-row"><span class="info-key">Tile</span><span class="info-val">${tileId ? TILE_MAP[tileId]?.name || tileId : '—'}</span></div>
  `;
}

// ═══════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════
const ghost = document.getElementById('drag-ghost');
const ghostFill = document.getElementById('ghost-fill');

function startDrag(tileId, e) {
  isDragging = true;
  dragTileId = tileId;
  selectedTile = tileId;
  document.getElementById('st-tile').textContent = TILE_MAP[tileId]?.name || tileId;

  ghostFill.setAttribute('fill', getTileFill(tileId));
  ghost.style.display = 'block';
  moveGhost(e);
}

function moveGhost(e) {
  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
}

function endDrag(e) {
  if (!isDragging) return;
  isDragging = false;
  ghost.style.display = 'none';

  // Hit test SVG
  const svg = document.getElementById('wheel-svg');
  const rect = svg.getBoundingClientRect();
  const scaleX = 600 / rect.width;
  const scaleY = 600 / rect.height;
  const svgX = (e.clientX - rect.left) * scaleX;
  const svgY = (e.clientY - rect.top) * scaleY;
  const hit = hitTest(svgX, svgY);
  if (hit) {
    placeTile(hit.ring, hit.seg, dragTileId);
  }
}

document.addEventListener('mousemove', e => {
  if (isDragging) moveGhost(e);
});
document.addEventListener('mouseup', endDrag);

// ═══════════════════════════════════════════════════════
//  PALETTE UI
// ═══════════════════════════════════════════════════════
function buildPalette() {
  const scroll = document.getElementById('palette-scroll');
  scroll.innerHTML = '';

  TILE_CATS.forEach(cat => {
    const catDiv = document.createElement('div');

    const catLbl = document.createElement('div');
    catLbl.className = 'cat-label';
    catLbl.textContent = cat.label;
    catDiv.appendChild(catLbl);

    const grid = document.createElement('div');
    grid.className = 'tile-grid';

    cat.tiles.forEach(tile => {
      const item = document.createElement('div');
      item.className = 'tile-item';
      item.id = `tile-item-${tile.id}`;
      item.innerHTML = getTilePreviewSVG(tile) + `<div class="tile-name">${tile.name}</div>`;

      item.addEventListener('mousedown', e => {
        e.preventDefault();
        selectTile(tile.id);
        startDrag(tile.id, e);
      });

      item.addEventListener('click', () => selectTile(tile.id));
      grid.appendChild(item);
    });

    catDiv.appendChild(grid);
    scroll.appendChild(catDiv);
  });
}

function selectTile(tileId) {
  selectedTile = tileId;
  document.getElementById('st-tile').textContent = TILE_MAP[tileId]?.name || tileId;
  document.querySelectorAll('.tile-item').forEach(el => el.classList.remove('selected-tile'));
  const el = document.getElementById(`tile-item-${tileId}`);
  if (el) el.classList.add('selected-tile');
}

// ═══════════════════════════════════════════════════════
//  RING TOGGLES
// ═══════════════════════════════════════════════════════
function buildRingToggles() {
  const container = document.getElementById('ring-toggles');
  container.innerHTML = '';
  RING_DEFS.forEach(({ label }, ri) => {
    const div = document.createElement('div');
    div.className = `ring-toggle ${ringActive[ri] ? 'active' : ''}`;
    div.innerHTML = `<div class="ring-dot" style="background:${RING_DOT_COLORS[ri]}"></div><span>${label}</span>`;
    div.addEventListener('click', () => {
      ringActive[ri] = !ringActive[ri];
      div.classList.toggle('active', ringActive[ri]);
      buildWheel();
    });
    container.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════
function updateStatus() {
  const filled = Object.keys(grid).length;
  document.getElementById('hdr-filled').textContent = filled;
  document.getElementById('hdr-segs').textContent = numSegs;
  document.getElementById('hdr-sym').textContent =
    { rotational:'Rotational', bilateral:'Bilateral', quadrant:'Quadrant', none:'None' }[symMode];
}

const SEG_OPTIONS = [6, 8, 10, 12, 16, 20, 24];
let segIdx = SEG_OPTIONS.indexOf(12);

document.getElementById('seg-dec').addEventListener('click', () => {
  if (segIdx > 0) { segIdx--; setSegs(SEG_OPTIONS[segIdx]); }
});
document.getElementById('seg-inc').addEventListener('click', () => {
  if (segIdx < SEG_OPTIONS.length-1) { segIdx++; setSegs(SEG_OPTIONS[segIdx]); }
});

function setSegs(n) {
  numSegs = n;
  grid = {};
  document.getElementById('seg-display').textContent = n;
  buildWheel();
  updateStatus();
}

// Symmetry buttons
document.querySelectorAll('.sym-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    symMode = btn.dataset.sym;
    document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateStatus();
  });
});

// Fill active ring
document.getElementById('btn-fill-sym').addEventListener('click', () => {
  if (!selectedTile || !hoveredCell) {
    // Fill all active rings with selected tile if hovered
    return;
  }
  const { ri } = hoveredCell;
  if (!ringActive[ri]) return;
  for (let s = 0; s < numSegs; s++) placeTile(ri, s, selectedTile);
});

// Clear all
document.getElementById('btn-clear').addEventListener('click', () => {
  grid = {};
  buildWheel();
  updateStatus();
});

// Export SVG
document.getElementById('btn-export').addEventListener('click', () => {
  const svg = document.getElementById('wheel-svg');
  const serializer = new XMLSerializer();
  let src = serializer.serializeToString(svg);
  src = '<?xml version="1.0" encoding="utf-8"?>\n' + src;
  const blob = new Blob([src], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'rosette.svg'; a.click();
  URL.revokeObjectURL(url);
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildPatternDefs();
buildPalette();
buildRingToggles();
buildWheel();
updateStatus();

// Select maple by default
selectTile('maple');

// Keyboard shortcut: delete selected cell
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    selectedTile = null;
    isDragging = false;
    ghost.style.display = 'none';
    document.querySelectorAll('.tile-item').forEach(el => el.classList.remove('selected-tile'));
    document.getElementById('st-tile').textContent = '—';
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && hoveredCell) {
    const { ri, si } = hoveredCell;
    placeTile(ri, si, 'clear');
  }
});
</script>
