<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Production Shop — ERP & CAM for Professional Luthiers</title>
  <meta name="description" content="The all-in-one ERP and CAM platform for professional instrument makers. Design tools, CNC machining workflows, and business operations built for luthiers." />
  <style>
    /* =============================================
       DESIGN TOKENS
       ============================================= */
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-primary-light: #dbeafe;
      --color-accent: #0d9488;
      --color-accent-dark: #0f766e;
      --color-surface: #ffffff;
      --color-surface-alt: #f8fafc;
      --color-surface-dark: #0f172a;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-text-light: #94a3b8;
      --color-border: #e2e8f0;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-danger: #ef4444;

      --font-family-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-family-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;

      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 1.875rem;
      --font-size-4xl: 2.25rem;
      --font-size-5xl: 3rem;

      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;

      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);

      --transition: 150ms ease;
      --max-width: 1200px;
    }

    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family-sans);
      font-size: var(--font-size-base);
      color: var(--color-text);
      background-color: var(--color-surface);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul {
      list-style: none;
    }

    button, input {
      font-family: inherit;
    }

    /* =============================================
       UTILITY CLASSES
       ============================================= */
    .container {
      width: 100%;
      max-width: var(--max-width);
      margin-inline: auto;
      padding-inline: 1.5rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* =============================================
       NAVIGATION
       ============================================= */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }

    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 4rem;
    }

    .nav__logo {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-weight: 700;
      font-size: var(--font-size-lg);
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    /* Small logo icon — two overlapping gear-like circles */
    .nav__logo-icon {
      width: 2rem;
      height: 2rem;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav__logo-icon svg {
      width: 1.125rem;
      height: 1.125rem;
      fill: white;
    }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav__link {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      transition: color var(--transition);
    }

    .nav__link:hover,
    .nav__link--active {
      color: var(--color-primary);
    }

    .nav__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      background-color: var(--color-primary);
      color: white;
      font-size: var(--font-size-sm);
      font-weight: 600;
      border-radius: var(--radius-md);
      transition: background-color var(--transition), transform var(--transition);
    }

    .nav__cta:hover {
      background-color: var(--color-primary-dark);
      transform: translateY(-1px);
    }

    /* Mobile menu toggle */
    .nav__toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
    }

    .nav__toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background-color: var(--color-text);
      border-radius: 2px;
      transition: transform var(--transition), opacity var(--transition);
    }

    /* Mobile drawer */
    .nav__mobile {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--color-border);
      padding: 1rem 0;
      background-color: var(--color-surface);
    }

    .nav__mobile.is-open {
      display: flex;
    }

    .nav__mobile-link {
      padding: 0.75rem 1.5rem;
      font-size: var(--font-size-base);
      font-weight: 500;
      color: var(--color-text-muted);
      transition: color var(--transition), background-color var(--transition);
    }

    .nav__mobile-link:hover {
      color: var(--color-primary);
      background-color: var(--color-surface-alt);
    }

    .nav__mobile-cta {
      margin: 0.75rem 1.5rem 0;
      padding: 0.75rem 1rem;
      background-color: var(--color-primary);
      color: white;
      font-size: var(--font-size-base);
      font-weight: 600;
      border-radius: var(--radius-md);
      text-align: center;
    }

    /* =============================================
       HERO SECTION
       ============================================= */
    .hero {
      position: relative;
      padding-block: 6rem 5rem;
      overflow: hidden;

      /* Dark wood grain texture via layered CSS gradients */
      background-color: var(--color-surface-dark);
      background-image:
        /* Fine grain overlay */
        repeating-linear-gradient(
          92deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.012) 2px,
          rgba(255,255,255,0.012) 4px
        ),
        /* Medium grain lines */
        repeating-linear-gradient(
          88deg,
          transparent,
          transparent 8px,
          rgba(255,255,255,0.018) 8px,
          rgba(255,255,255,0.018) 10px
        ),
        /* Knot-like radial gradients to simulate wood figure */
        radial-gradient(ellipse 80% 40% at 20% 60%, rgba(120,60,10,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 30% at 80% 30%, rgba(100,45,8,0.3) 0%, transparent 55%),
        /* Base wood color gradient */
        linear-gradient(
          175deg,
          #1a0e06 0%,
          #2a1508 25%,
          #1e1008 50%,
          #2c1a0a 75%,
          #150d05 100%
        );
    }

    /* Subtle blue-to-transparent gradient overlay for brand depth */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37,99,235,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Accent glow near the CTA area */
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2rem;
      right: -4rem;
      width: 30rem;
      height: 30rem;
      background: radial-gradient(circle, rgba(13,148,136,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero__inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      background-color: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.4);
      border-radius: 9999px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: #93c5fd;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero__eyebrow-dot {
      width: 6px;
      height: 6px;
      background-color: var(--color-accent);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .hero__headline {
      font-size: clamp(2.25rem, 5vw, var(--font-size-5xl));
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: white;
      margin-bottom: 1.25rem;
    }

    .hero__headline-accent {
      /* Gradient text for the key phrase */
      background: linear-gradient(90deg, #60a5fa 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero__subhead {
      font-size: var(--font-size-lg);
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 46ch;
    }

    .hero__actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: background-color var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn--primary {
      padding: 0.875rem 1.75rem;
      background-color: var(--color-primary);
      color: white;
      font-size: var(--font-size-base);
      box-shadow: 0 4px 14px rgba(37,99,235,0.4);
    }

    .btn--primary:hover {
      background-color: var(--color-primary-dark);
      box-shadow: 0 6px 20px rgba(37,99,235,0.5);
    }

    .btn--ghost {
      padding: 0.875rem 1.5rem;
      background-color: rgba(255,255,255,0.08);
      color: white;
      font-size: var(--font-size-base);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn--ghost:hover {
      background-color: rgba(255,255,255,0.14);
    }

    .btn--outline {
      padding: 0.75rem 1.5rem;
      background-color: transparent;
      color: var(--color-primary);
      font-size: var(--font-size-base);
      border: 2px solid var(--color-primary);
    }

    .btn--outline:hover {
      background-color: var(--color-primary-light);
    }

    /* Play icon for Watch Demo button */
    .btn__play {
      width: 1.25rem;
      height: 1.25rem;
      background-color: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn__play::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 4px 0 4px 7px;
      border-color: transparent transparent transparent white;
      margin-left: 1px;
    }

    /* Hero visual / mockup panel */
    .hero__visual {
      position: relative;
    }

    .hero__mockup {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      backdrop-filter: blur(4px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        var(--shadow-xl),
        0 0 60px rgba(37,99,235,0.1);
    }

    .mockup__topbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .mockup__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .mockup__dot--red   { background: #ef4444; }
    .mockup__dot--yellow { background: #f59e0b; }
    .mockup__dot--green { background: #10b981; }

    .mockup__title {
      margin-left: 0.5rem;
      font-family: var(--font-family-mono);
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.35);
    }

    /* Fake CAD/dashboard content rows */
    .mockup__content {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .mockup__row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .mockup__label {
      font-family: var(--font-family-mono);
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.5);
      width: 7rem;
      flex-shrink: 0;
    }

    .mockup__bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 9999px;
      overflow: hidden;
    }

    .mockup__bar-fill {
      height: 100%;
      border-radius: 9999px;
    }

    .mockup__bar-fill--blue  { background: linear-gradient(90deg, #2563eb, #60a5fa); }
    .mockup__bar-fill--teal  { background: linear-gradient(90deg, #0d9488, #34d399); }
    .mockup__bar-fill--amber { background: linear-gradient(90deg, #f59e0b, #fcd34d); }

    .mockup__stat {
      font-family: var(--font-family-mono);
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.4);
      width: 3rem;
      text-align: right;
      flex-shrink: 0;
    }

    .mockup__divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-block: 0.25rem;
    }

    .mockup__status-row {
      display: flex;
      gap: 0.625rem;
      flex-wrap: wrap;
    }

    .mockup__badge {
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      font-family: var(--font-family-mono);
    }

    .mockup__badge--success { background: rgba(16,185,129,0.2); color: #34d399; }
    .mockup__badge--blue    { background: rgba(37,99,235,0.25); color: #93c5fd; }
    .mockup__badge--amber   { background: rgba(245,158,11,0.2); color: #fcd34d; }

    /* Floating metric card */
    .hero__float-card {
      position: absolute;
      bottom: -1.5rem;
      left: -2rem;
      background: white;
      border-radius: var(--radius-lg);
      padding: 0.875rem 1.125rem;
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 180px;
    }

    .float-card__icon {
      width: 2.25rem;
      height: 2.25rem;
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .float-card__icon svg {
      width: 1.125rem;
      height: 1.125rem;
      fill: white;
    }

    .float-card__label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      line-height: 1.2;
    }

    .float-card__value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.2;
    }

    /* =============================================
       SOCIAL PROOF BAR
       ============================================= */
    .social-proof {
      background-color: var(--color-surface-alt);
      border-bottom: 1px solid var(--color-border);
      padding-block: 1.25rem;
    }

    .social-proof__inner {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-proof__label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .social-proof__divider {
      width: 1px;
      height: 1.25rem;
      background-color: var(--color-border);
    }

    .social-proof__items {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-proof__item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text);
    }

    .social-proof__item-icon {
      color: var(--color-accent);
      font-size: var(--font-size-lg);
      line-height: 1;
    }

    /* =============================================
       FEATURE OVERVIEW (3-column cards)
       ============================================= */
    .features {
      padding-block: 5rem;
      background-color: var(--color-surface);
    }

    .section-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .section-eyebrow {
      display: inline-block;
      font-size: var(--font-size-xs);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: clamp(var(--font-size-3xl), 4vw, var(--font-size-4xl));
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--color-text);
      margin-bottom: 1rem;
    }

    .section-subtitle {
      font-size: var(--font-size-lg);
      color: var(--color-text-muted);
      max-width: 54ch;
      margin-inline: auto;
      line-height: 1.7;
    }

    .features__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .feature-card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .feature-card--design::before  { background: linear-gradient(90deg, var(--color-primary), #60a5fa); }
    .feature-card--cam::before     { background: linear-gradient(90deg, var(--color-accent), #34d399); }
    .feature-card--business::before{ background: linear-gradient(90deg, #7c3aed, #a78bfa); }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-card__icon {
      width: 3rem;
      height: 3rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .feature-card__icon--design   { background: var(--color-primary-light); }
    .feature-card__icon--cam      { background: rgba(13,148,136,0.12); }
    .feature-card__icon--business { background: rgba(124,58,237,0.1); }

    .feature-card__icon svg {
      width: 1.5rem;
      height: 1.5rem;
    }

    .feature-card__icon--design svg   { fill: var(--color-primary); }
    .feature-card__icon--cam svg      { fill: var(--color-accent); }
    .feature-card__icon--business svg { fill: #7c3aed; }

    .feature-card__title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.625rem;
    }

    .feature-card__desc {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .feature-card__list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .feature-card__list-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }

    .feature-card__list-item::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .feature-card--design .feature-card__list-item::before   { background: var(--color-primary); }
    .feature-card--cam .feature-card__list-item::before       { background: var(--color-accent); }
    .feature-card--business .feature-card__list-item::before  { background: #7c3aed; }

    /* =============================================
       HOW IT WORKS
       ============================================= */
    .how-it-works {
      padding-block: 5rem;
      background-color: var(--color-surface-alt);
    }

    .how-it-works__steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      position: relative;
    }

    /* Connecting line between steps */
    .how-it-works__steps::before {
      content: '';
      position: absolute;
      top: 2.25rem;
      left: calc(16.67% + 1rem);
      right: calc(16.67% + 1rem);
      height: 2px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      z-index: 0;
    }

    .step {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .step__number-wrap {
      display: flex;
